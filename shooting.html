<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Star Wishes ⭐</title>

<style>

body{
height:100vh;
overflow:hidden;
color:white;
text-align:center;
font-family:Arial;
padding-top:80px;
margin:0;
}

/* GIF background */
.bg{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:
linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)),
url("https://media1.giphy.com/media/v1.Y2lkPTc5MGI3NjExMTZsemd4aGR6cmcyYXB3anJrdW9xM3lncDEwcnZxdjc5cDlxcmF4MiZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/aGeePr7nv6ra8/giphy.gif");
background-size:cover;
background-position:center;
z-index:-1;
transform: scaleX(-1);
}
/* star button */

.star{
font-size:60px;
cursor:pointer;
transition:0.3s;
}

.star:hover{
transform:scale(1.2);
}

/* shooting star */

.shooting{
position:absolute;
top:20%;
left:-100px;
font-size:40px;
animation:shoot 1.5s linear;
}

@keyframes shoot{
0%{transform:translateX(0) translateY(0);}
100%{transform:translateX(120vw) translateY(40vh);}
}

/* message */

#wish{
margin-top:40px;
font-size:24px;
color:#ffd700;
}

</style>
</head>

<body>

<div class="bg"></div>

<h1>Make a Wish ⭐</h1>
<p>Click the star to send a shooting star</p>

<div class="star" onclick="shootStar()">⭐</div>

<div id="wish"></div>

<script>

let wishes=[
"You deserve happiness ✨",
"Dharti is by your side always🌌",
"Something beautiful is coming your way ⭐",
"and that beautifull thing is mee 🌚",
"You are brighter than any star 💫"
];

function shootStar(){

let star=document.createElement("div");
star.className="shooting";
star.innerHTML="🌠";

document.body.appendChild(star);

setTimeout(()=>{
star.remove();
},1500);

let random=Math.floor(Math.random()*wishes.length);
document.getElementById("wish").innerText=wishes[random];

}

</script>

<div style="text-align:center; margin-top:50px;">
  <a href="5.html.html" style="text-decoration:none;">
    <button style="
      background: linear-gradient(135deg, #ff9ce3, #ff66b3);
      color: white;
      font-size: 28px;
      padding: 15px 30px;
      border-radius: 50px;
      border: 2px solid white;
      cursor: pointer;
      box-shadow: 0 8px 15px rgba(0,0,0,0.3);
      transition: all 0.3s ease;
      font-weight:bold;
    ">
      ฅ^•ﻌ•^ฅ 
    </button>
  </a>
</div>

<style>
button:hover{
  transform: scale(1.2) rotate(-5deg);
  box-shadow: 0 12px 20px rgba(0,0,0,0.5);
}

</body>
</html>
