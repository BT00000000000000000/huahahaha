<!DOCTYPE html>
<html>
<head>
<title>Surprise Rabbit 🐰</title>
<style>
body{
  background: #ffe6f0;
  text-align:center;
  font-family: Arial;
  padding-top:100px;
}

h1{
  color: #ff4da6;
  font-size: 36px;
  margin-bottom:50px;
  animation: bounceText 1.5s infinite;
}

.rabbit{
  width:200px;
  animation: float 2s infinite alternate;
}

@keyframes float{
  0% {transform: translateY(0);}
  100% {transform: translateY(-20px);}
}

@keyframes bounceText{
  0%, 100% {transform: translateY(0);}
  50% {transform: translateY(-10px);}
}
</style>
</head>
<body>

<h1>Thinking… you wanna more??? 🐇</h1>
<img src="r.gif" class="rabbit" alt="Cute Rabbit">

<p style="font-size:22px;">Here is more</p>
<div style="text-align:center; margin-top:50px;">
  <a href="pre.html" style="text-decoration:none;">
    <button style="
      background: linear-gradient(135deg, #ff9ce3, #ff66b3);
      color: white;
      font-size: 28px;
      padding: 15px 30px;
      border-radius: 50px;
      border: 2px solid white;
      cursor: pointer;
      box-shadow: 0 8px 15px rgba(0,0,0,0.3);
      transition: all 0.3s ease;
      font-weight:bold;
    ">
      ฅ^•ﻌ•^ฅ Here is more
    </button>
  </a>
</div>

<style>
button:hover{
  transform: scale(1.2) rotate(-5deg);
  box-shadow: 0 12px 20px rgba(0,0,0,0.5);
}
</style>
</body>
</html>
