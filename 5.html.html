<!DOCTYPE html>
<html>
<head>
<title>Final Page</title>

<style>
body{
  background:black;
  color:white;
  text-align:center;
  font-family:Arial;
  overflow:hidden;
}

h1{
  margin-top:150px;
  font-size:36px;
}

.note{
  margin-top:30px;
  font-size:24px;
  color:#ffb3d9;
}

/* Heart animation */
.heart{
  position:absolute;
  color:red;
  font-size:30px;
  animation:float 5s linear infinite;
}

@keyframes float{
  0%{transform:translateY(100vh); opacity:1;}
  100%{transform:translateY(-10vh); opacity:0;}
}
</style>
</head>

<body>

<h1>This page exists just to make you smile ❤️</h1>

<p class="note">"That's it shona, now I'm tired of coding. Enough hain boss!"</p>

<script>
// Create floating hearts
for(let i=0;i<20;i++){
  let heart=document.createElement("div");
  heart.className="heart";
  heart.innerHTML="❤️";
  heart.style.left=Math.random()*100+"vw";
  heart.style.animationDuration=(3+Math.random()*2)+"s";
  document.body.appendChild(heart);
}
</script>

</body>
</html>
